name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - '!v*-alpha.*'
      - '!v*-beta.*'
      - '!v*-rc.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7
      - name: Read release announcement preference
        id: discord_announcement
        shell: pwsh
        run: |
          $skipDiscord = git log -1 --format=%B $env:GITHUB_SHA | Select-String -SimpleMatch '[skip discord]' -Quiet
          $enabled = -not $skipDiscord
          "enabled=$($enabled.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.302
          cache: true
          cache-dependency-path: '**/packages.lock.json'
      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress
      - name: Build release assets
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}'.TrimStart('v')
          ./scripts/Build-Release.ps1 -Version $version
          ./scripts/Verify-Release.ps1
      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = '${{ github.ref_name }}'.TrimStart('v')
          gh release create '${{ github.ref_name }}' artifacts/release/* --verify-tag --notes-file "docs/release-notes/$version.md" --title "Expeditions Macro ${{ github.ref_name }}"
      - name: Announce release on Discord
        if: ${{ steps.discord_announcement.outputs.enabled == 'true' }}
        shell: pwsh
        env:
          DISCORD_RELEASE_WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:DISCORD_RELEASE_WEBHOOK_URL)) {
            throw 'The DISCORD_RELEASE_WEBHOOK_URL repository secret is missing.'
          }
          $version = '${{ github.ref_name }}'.TrimStart('v')
          ./scripts/Send-DiscordReleaseAnnouncement.ps1 `
            -WebhookUrl $env:DISCORD_RELEASE_WEBHOOK_URL `
            -Repository '${{ github.repository }}' `
            -Tag '${{ github.ref_name }}' `
            -ReleaseNotesPath "docs/release-notes/$version.md"
