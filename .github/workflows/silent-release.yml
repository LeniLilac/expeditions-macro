name: Silent prerelease

on:
  push:
    tags:
      - 'v*-alpha.*'
      - 'v*-beta.*'
      - 'v*-rc.*'

permissions:
  contents: read

jobs:
  validation:
    uses: ./.github/workflows/validation.yml

  publish:
    name: Publish beta without waiting for validation
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /.editorconfig
            /AGENTS.md
            /CHANGELOG.md
            /CONTRIBUTING.md
            /Directory.Build.props
            /Directory.Packages.props
            /ExpeditionsMacro.slnx
            /global.json
            /LICENSE.md
            /NOTICE.md
            /PRIVACY.md
            /README.md
            /THIRD-PARTY-NOTICES.md
            /assets/
            /datasets/README.md
            /detector-packs/
            /docs/
            /eng/
            /installer/
            /scripts/
            /src/
            /tests/
            /tools/
      - name: Verify prerelease metadata and repository policy
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}'.TrimStart('v')
          ./scripts/Invoke-ReleasePreflight.ps1 -Version $version -Silent -RequireCleanTree
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.302
          cache: true
          cache-dependency-path: '**/packages.lock.json'
      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress
      - name: Build prerelease assets
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}'.TrimStart('v')
          ./scripts/Build-Release.ps1 -Version $version -SkipTests
          ./scripts/Verify-Release.ps1
      - name: Publish silent GitHub prerelease
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = '${{ github.ref_name }}'.TrimStart('v')
          gh release create '${{ github.ref_name }}' artifacts/release/* --verify-tag --prerelease --latest=false --notes-file "docs/release-notes/$version.md" --title "Expeditions Macro ${{ github.ref_name }}"
